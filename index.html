<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书籍信息录入系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>📚 书籍信息录入系统</h1>
      <p class="subtitle">扫描条形码自动录入 · 支持手动编辑</p>
    </header>

    <main>
      <section class="scan-section">
        <div class="scan-box">
          <div class="scan-icon">📷</div>
          <div class="scan-status" id="scanStatus">等待扫描...</div>
          <input type="text" id="scanInput" class="scan-input" placeholder="使用扫码枪扫描条形码，或手动输入ISBN" autofocus>
          <div class="scan-hint">扫码枪扫描后将自动查询书籍信息</div>
        </div>
      </section>

      <section class="book-form-section" id="bookFormSection" style="display:none;">
        <h2>📖 书籍信息</h2>
        <form id="bookForm">
          <div class="form-row">
            <div class="form-group">
              <label for="isbn">ISBN</label>
              <input type="text" id="isbn" readonly>
            </div>
            <div class="form-group">
              <label for="title">书名 <span class="required">*</span></label>
              <input type="text" id="title" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="author">作者</label>
              <input type="text" id="author">
            </div>
            <div class="form-group">
              <label for="publisher">出版社</label>
              <input type="text" id="publisher">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="publishDate">出版日期</label>
              <input type="text" id="publishDate">
            </div>
            <div class="form-group">
              <label for="pages">页数</label>
              <input type="number" id="pages">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="category">分类</label>
              <input type="text" id="category">
            </div>
            <div class="form-group">
              <label for="price">定价</label>
              <input type="text" id="price" placeholder="如：58.00">
            </div>
          </div>
          <div class="form-group full-width">
            <label for="description">简介</label>
            <textarea id="description" rows="3"></textarea>
          </div>
          <div class="form-group full-width">
            <label for="notes">备注</label>
            <textarea id="notes" rows="2"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 保存</button>
            <button type="button" class="btn btn-secondary" onclick="cancelEdit()">✖ 取消</button>
          </div>
        </form>
      </section>

      <section class="books-section">
        <div class="books-header">
          <h2>📚 已录入书籍 (<span id="bookCount">0</span>)</h2>
          <div class="books-actions">
            <input type="text" id="searchInput" placeholder="搜索书名、作者、ISBN..." class="search-input">
            <button class="btn btn-outline" onclick="exportData()">📤 导出JSON</button>
            <label class="btn btn-outline import-btn">
              📥 导入JSON
              <input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display:none;">
            </label>
          </div>
        </div>
        <div class="books-list" id="booksList">
          <div class="empty-state">暂无书籍记录，扫描条形码开始录入</div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
